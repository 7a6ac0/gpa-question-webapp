services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: gpa_questions
      POSTGRES_USER: gpa
      POSTGRES_PASSWORD: gpa_dev_password
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gpa -d gpa_questions"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    environment:
      DATABASE_URL: postgresql://gpa:gpa_dev_password@db:5432/gpa_questions
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://litellm.justmao.com/v1}
      LLM_MODEL: ${LLM_MODEL:-claude-haiku-4-5-20251001}
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./data:/app/data

volumes:
  pgdata:
